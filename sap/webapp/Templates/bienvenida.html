<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bienvenida</title>
  <style>
    body {
      background-color: #f0fffb; /* celeste claro */
      font-family: "Times New Roman", sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      color: #004d66; /* azul oscuro para contraste */
    }
    h1 {
      background-color: #00bcd4; /* celeste más intenso */
      color: white;
      padding: 20px;
      margin: 0;
    }
    div {
      margin-top: 30px;
      font-size: 18px;
    }
    img {
      margin-top: 20px;
      width: 150px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>Sistema de administración de Personas</h1> <!-- comentario -->
  <div>
    El numero de personas registradas es: {{no_persona}} <!-- <br>{{persona}} -->
  </div>
  <div>
      <ul>
        {% for x in persona %}
          <li>
            Persona {{x.id}}: {{x.nombre}} {{x.apellido}}
            <a href="/detalle_persona/{{x.id}}">Detalles</a>

          </li>

        {% endfor %}
      </ul>
  <h2>Crear nueva persona: <a href="nuevapersona/">Agg Personas </a> </h2>

    <!-- Imagen simple decorativa -->
    <br><img src="https://th.bing.com/th/id/R.c77a9393426a0b75d9bb3800f7168cee?rik=nWvc%2bMCudu172A&pid=ImgRaw&r=0" alt="Decoración celeste" style="width:50%; height:auto;">
  </div>
</body>
</html>
